apiVersion: v1
kind: Service
metadata:
  name: httpd-service
spec:
  type: NodePort
  selector:
    app: httpd_app # Must match the labels in ReplicaSet template
    type: front-end
  ports:
    - port: 80           # Port exposed on the Service
      targetPort: 80     # Port the container is listening on
      nodePort: 30080    # Port exposed on each Node (30000-32767)
      protocol: TCP
