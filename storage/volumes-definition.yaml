apiVersion: v1
kind: Pod
metadata:
  name: random-number-generator
spec:
  containers:
    - image: alpine
      name: alpine
      command: ["/bin/sh", "-c"]
      args:
        - while true; do shuf -i 0-100 -n 1 >> /opt/number.out; sleep 5; done
      volumeMounts:
        - mountPath: /opt
          name: data-volume
  volumes:
    - name: data-volume
      hostPath:
        path: /data/storage
        type: DirectoryOrCreate
