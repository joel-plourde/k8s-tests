apiVersion: batch/v1
kind: CronJob
metadata:
  name: nautilus
spec:
  schedule: "*/8 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: cron-nautilus
            image: httpd:latest
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c", "date; echo Welcome to Jojo Lab"]
          restartPolicy: OnFailure
